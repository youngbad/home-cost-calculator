{% extends "base.html" %}
{% block title %}Log In - Expense Tracker{% endblock %}

{% block content %}
<div class="card form-card" style="max-width: 400px; margin: 2rem auto;">
  <h1 style="margin-bottom: 1.5rem; text-align: center;">Log In</h1>
  <form method="post">
    <div class="form-group" style="margin-bottom: 1rem;">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus />
    </div>
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
  </form>
  <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>.
  </p>
</div>
{% endblock %}
