{% extends "base.html" %}
{% block title %}{{ 'Edit Wallet' if wallet else 'Create Wallet' }} - Expense Tracker{% endblock %}

{% block content %}
<section class="page-header">
  <h1>{{ 'Edit Wallet' if wallet else 'Create Wallet' }}</h1>
  <a href="{{ url_for('wallets.list_wallets') }}" class="btn btn-secondary">← Back</a>
</section>

<div class="card form-card">
  <form method="post">
    <div class="form-group" style="margin-bottom: 1rem;">
      <label for="name">Wallet Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" required value="{{ wallet.name if wallet else '' }}" placeholder="e.g. Home Renovation, Daily Groceries" autofocus />
    </div>
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label for="description">Description</label>
      <input type="text" id="description" name="description" value="{{ wallet.description if wallet else '' }}" placeholder="Optional details..." />
    </div>
    
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if wallet else 'Create Wallet' }}</button>
      <a href="{{ url_for('wallets.list_wallets') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
